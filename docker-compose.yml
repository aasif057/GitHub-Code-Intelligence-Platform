services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: github-agent-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334" # Optional: Exposed GRPC port, highly recommended for faster RAG operations
    volumes:
      - ./qdrant_storage:/qdrant/storage
